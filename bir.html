<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday ❤️</title>


<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>


<!-- Font Awesome -->
<link rel="stylesheet" 
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


<!-- GSAP Animation -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>


<style>

body{
    overflow-x:hidden;
}


/* Floating hearts */

.heart{
    position:absolute;
    color:#ff4d88;
    font-size:25px;
    animation:float 8s infinite;
}


@keyframes float{

0%{
    transform:translateY(100vh) scale(0);
}

100%{
    transform:translateY(-10vh) scale(1);
}

}


.glow{

box-shadow:
0 0 20px #ff4d88,
0 0 40px #ff4d88;

}


</style>


</head>



<body class="bg-black text-white">


<!-- Music -->
 <audio autoplay loop>
    <source src="birthday music.mp3" type="audio/mp3">
</audio>




<!-- Hearts -->

<div class="heart left-10">❤️</div>
<div class="heart left-40">💖</div>
<div class="heart right-20">💕</div>
<div class="heart right-40">❤️</div>



<section class="min-h-screen flex items-center justify-center p-6">


<div id="card"
class="bg-gray-900/80 backdrop-blur-xl 
rounded-3xl p-10 text-center max-w-xl glow">


<i class="fa-solid fa-heart text-pink-500 text-5xl"></i>


<h1 class="text-5xl font-bold mt-5
bg-gradient-to-r from-pink-400 to-purple-500 
text-transparent bg-clip-text">

Happy Birthday ❤️

</h1>



<h2 class="text-2xl mt-4">

My Beautiful Love 🌙

</h2>




<img src="nar.jpeg"
class="w-52 h-52 rounded-full mx-auto mt-6 object-cover border-4 border-pink-500">



<p class="mt-6 text-lg text-gray-300">

On your special day, I just want you to know
that you are one of the most precious people
in my life.  

May your smile always shine brighter than stars ✨

</p>



<button onclick="surprise()"
class="mt-8 px-8 py-3 rounded-full
bg-pink-600 hover:bg-pink-700">

<i class="fa-solid fa-gift"></i>
Open Surprise

</button>



<h2 id="message"
class="mt-6 text-pink-400 text-xl">

</h2>



</div>


</section>




<script>


// Card animation

gsap.from("#card",{

scale:0,
opacity:0,
duration:2,
ease:"elastic"

});



// Heart animation

gsap.to(".heart",{

x:100,
rotation:360,
duration:8,
repeat:-1,
ease:"none"

});




// Surprise message

function surprise(){

document.getElementById("message").innerHTML=

"❤️ Happy Birthday My Love ❤️ <br><br>\
You deserve endless happiness, love and beautiful moments ✨";

}



</script>


</body>

</html>
